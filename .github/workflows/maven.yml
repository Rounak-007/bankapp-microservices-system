# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
    paths:
      - 'account-service/**'
      - 'api-gateway/**'
      - 'config-server/**'
      - 'customer-service/**'
      - 'service-registry/**'

jobs:
  # ==========================================
  # JOB 1: BUILDING & TESTING
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      # Ensures that if one service build fails, the other 4 keep running
      fail-fast: false
      matrix:
        service: [
          'account-service',
          'api-gateway',
          'config-server',
          'customer-service',
          'service-registry'
        ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required for paths-filter to accurately check changes

      # This smart filter checks if this specific service directory had changes in this commit
      - name: Check for Changes in ${{ matrix.service }}
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - '${{ matrix.service }}/**'

      - name: Set up JDK 17
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        if: steps.filter.outputs.changed == 'true'
        run: |
          cd ${{ matrix.service }}
          mvn test

      - name: Build with Maven
        if: steps.filter.outputs.changed == 'true'
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests

      # Saves the compiled JAR file so the deploy job can access it
      - name: Upload JAR Artifact
        if: steps.filter.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 1

  # ==========================================
  # JOB 2: DOCKERIZATION
  # ==========================================
  dockerization:
    runs-on: ubuntu-latest
    needs: build-and-test # Crucial: This prevents deploy from running until the build job finishes
    strategy:
      fail-fast: false
      matrix:
        service: [
          'account-service',
          'api-gateway',
          'config-server',
          'customer-service',
          'service-registry'
        ]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # We still need the filter here so we know whether to skip the docker steps
      - name: Check for Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - '${{ matrix.service }}/**'

      # Downloads the JAR compiled in the previous job and places it back into the workspace
      - name: Download JAR Artifact
        if: steps.filter.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/

      - name: Set up Docker Buildx
        if: steps.filter.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.filter.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        if: steps.filter.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
    paths:
      - 'account-service/**'
      - 'api-gateway/**'
      - 'config-server/**'
      - 'customer-service/**'
      - 'service-registry/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'account-service/**'
      - 'api-gateway/**'
      - 'config-server/**'
      - 'customer-service/**'
      - 'service-registry/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      # Ensures that if one service build fails, the other 4 keep running
      fail-fast: false
      matrix:
        service: [
          'account-service',
          'api-gateway',
          'config-server',
          'customer-service',
          'service-registry'
        ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required for paths-filter to accurately check changes

      # This smart filter checks if this specific service directory had changes in this commit
      - name: Check for Changes in ${{ matrix.service }}
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - '${{ matrix.service }}/**'

      - name: Set up JDK 17
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        if: steps.filter.outputs.changed == 'true'
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests
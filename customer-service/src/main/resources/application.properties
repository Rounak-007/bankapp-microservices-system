spring.application.name=customer-service

server.port=9001

#config-client details
spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.fail-fast=true

spring.datasource.url=jdbc:mysql://localhost:3306/customer_servicedb

#eureka.instance.hostname=localhost

# Resilience4j Configuration
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=5
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=15s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.slidingWindowSize=5
resilience4j.circuitbreaker.configs.default.sliding-window-type=count_based

# Specific config for account service (optional, overrides default)
#resilience4j.circuitbreaker.instances.accountCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.account-service-circuit-breaker.baseConfig=default

#actuator
management.endpoints.web.exposure.include=*
#Show full details in the health endpoint
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

#resiliency retry configs
resilience4j.retry.instances.account-service-retry.max-attempts=3
resilience4j.retry.instances.account-service-retry.wait-duration=200ms
resilience4j.bulkhead.metrics.legacy.enabled=true
resilience4j.retry.metrics.enabled=true
resilience4j.retry.instances.account-service-retry.enable-exponential-backoff=true

# Add this to your retry properties
resilience4j.retry.instances.account-service-retry.retry-exceptions[0]=com.bankapp.v1.customer_service.exceptions.classes.DownstreamServiceUnavailableException
# Alternatively, to retry on all exceptions:
# resilience4j.retry.instances.account-service-retry.retry-exceptions[0]=java.lang.Exception

# Ensures Retry executes inside the Circuit Breaker context
resilience4j.circuitbreaker.circuit-breaker-aspect-order=1
resilience4j.retry.retry-aspect-order=2

spring.cloud.openfeign.circuitbreaker.enabled=false